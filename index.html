<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Heart with Orbital Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Chữ cố định ở tâm trái tim giống như "I believed" trong ảnh */
        .center-text {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 1.5rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255, 42, 109, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="center-text">Hạt bụi vũ trụ va thủng van tim anh</div>

    <script>
        // --- 1. KHỞI TẠO HỆ THỐNG 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Tạo không gian có chiều sâu với sương mù tối
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- 2. TẠO TEXTURE HẠT SÁNG MỊN ---
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };
        const particleTexture = createParticleTexture();

        // --- 3. TẠO TRÁI TIM HẠT (UPPER HEART) ---
        const heartCount = 4500;
        const heartGeo = new THREE.BufferGeometry();
        const heartPos = new Float32Array(heartCount * 3);
        const heartColors = new Float32Array(heartCount * 3);

        const colorHeartCenter = new THREE.Color('#ff2a6d');
        const colorHeartEdge = new THREE.Color('#9b51e0');

        for (let i = 0; i < heartCount; i++) {
            // Công thức toán học định hình khối Trái tim 3D phẳng dẹt dâng cao
            const t = Math.PI * (Math.random() * 2 - 1);
            const p = Math.PI * (Math.random() * 2 - 1);
            
            // Khối công thức lõi trái tim
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = 6 * Math.sin(p) * Math.sin(t); 

            // Căn chỉnh vị trí lên phía trên tâm màn hình
            heartPos[i * 3] = x * 0.28;
            heartPos[i * 3 + 1] = (y * 0.28) + 2.5; 
            heartPos[i * 3 + 2] = z * 0.25;

            // Hòa trộn màu Gradient chuyển từ hồng sang tím từ trong ra ngoài
            const mixRatio = Math.random();
            const finalColor = colorHeartCenter.clone().lerp(colorHeartEdge, mixRatio);
            heartColors[i * 3] = finalColor.r;
            heartColors[i * 3 + 1] = finalColor.g;
            heartColors[i * 3 + 2] = finalColor.b;
        }

        heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPos, 3));
        heartGeo.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));

        const heartMat = new THREE.PointsMaterial({
            size: 0.15,
            map: particleTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const heartPoints = new THREE.Points(heartGeo, heartMat);
        scene.add(heartPoints);

        // --- 4. TẠO VÒNG TRÒN CHỮ VÀ HẠT QUAY PHÍA DƯỚI (ORBITAL RING) ---
        // Danh sách các từ chạy xung quanh trục giống như ảnh mẫu của bạn
        const textWords = ["Luôn hạnh phúc", "Lỗ mũi to", "Người anh yêu", "Mãi xinh đẹp", "Meo meo đầu to", "57 ký nè", "May mắn nhất"];
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // Tạo hiệu ứng đám mây hạt làm nền cho vòng xoáy chữ
        const ringParticleCount = 1500;
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = new Float32Array(ringParticleCount * 3);
        const ringColors = new Float32Array(ringParticleCount * 3);
        const colorRing = new THREE.Color('#ff7597');

        for(let i=0; i<ringParticleCount; i++) {
            const radius = 4 + Math.random() * 2.5; // Bán kính vòng xoáy
            const theta = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 1.2 - 3.5; // Hạ thấp xuống dưới trái tim

            ringPos[i * 3] = radius * Math.cos(theta);
            ringPos[i * 3 + 1] = yOffset;
            ringPos[i * 3 + 2] = radius * Math.sin(theta);

            ringColors[i * 3] = colorRing.r;
            ringColors[i * 3 + 1] = colorRing.g;
            ringColors[i * 3 + 2] = colorRing.b;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
        
        const ringPoints = new THREE.Points(ringGeo, heartMat);
        ringGroup.add(ringPoints);

        // Tạo chữ mô phỏng dạng Canvas Text Maps tích hợp trực tiếp vào không gian 3D
        const createTextMesh = (text) => {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Thiết kế font chữ mềm mại, sắc nét giống ảnh mẫu
            ctx.font = 'Bold 24px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Tạo bóng đổ nhẹ cho chữ
            ctx.shadowColor = 'rgba(255, 65, 108, 1)';
            ctx.shadowBlur = 8;
            ctx.fillText(text, 128, 32);

            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
            const geo = new THREE.PlaneGeometry(3, 0.75);
            return new THREE.Mesh(geo, mat);
        };

        // Sắp xếp các cụm chữ phân bổ đều theo hình tròn 3D nghiêng
        const radius = 4.8;
        textWords.forEach((word, index) => {
            const mesh = createTextMesh(word);
            const angle = (index / textWords.length) * Math.PI * 2;
            
            mesh.position.x = radius * Math.cos(angle);
            mesh.position.y = -3.5; // Khớp với cao độ của vòng hạt phía dưới
            mesh.position.z = radius * Math.sin(angle);
            
            ringGroup.add(mesh);
        });

        // Nghiêng nhẹ cụm vòng tròn phía dưới để tạo hiệu ứng góc nhìn 3D điện ảnh y như mẫu
        ringGroup.rotation.x = 0.35; 

        // --- 5. HỆ THỐNG SAO BĂNG / BỤI VŨ TRỤ NỀN (BACKGROUND STARS) ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starsPos = new Float32Array(starsCount * 3);

        for(let i=0; i<starsCount; i++) {
            starsPos[i*3] = (Math.random() - 0.5) * 50;
            starsPos[i*3+1] = (Math.random() - 0.5) * 50;
            starsPos[i*3+2] = (Math.random() - 0.5) * 50;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ size: 0.06, map: particleTexture, transparent: true, opacity: 0.6 });
        const starField = new THREE.Points(starsGeo, starsMat);
        scene.add(starField);

        // --- 6. ANIMATION VÀ HIỆU ỨNG CHUYỂN ĐỘNG MƯỢT MÀ ---
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 1. Trái tim tự quay nhẹ quanh trục và đập theo nhịp hàm Sin
            heartPoints.rotation.y = elapsedTime * 0.2;
            const pulseFactor = 1 + 0.05 * Math.sin(elapsedTime * 3.5);
            heartPoints.scale.set(pulseFactor, pulseFactor, pulseFactor);

            // 2. Vòng xoáy chữ và hạt phía dưới quay ngược chiều tự động
            ringGroup.rotation.y = -elapsedTime * 0.25;

            // 3. Giữ cho các mặt chữ luôn hướng về phía Camera để người xem đọc được rõ ràng
            ringGroup.children.forEach(child => {
                if(child instanceof THREE.Mesh) {
                    child.lookAt(camera.position);
                }
            });

            // 4. Bụi nền vũ trụ trôi nhẹ tự nhiên
            starField.rotation.y = elapsedTime * 0.02;

            renderer.render(scene, camera);
        }

        animate();

        // Xử lý co giãn khi xoay màn hình điện thoại hoặc thay đổi kích thước trình duyệt
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
