<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Eternal - Cosmic Heart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas for animations -->
    <canvas id="galaxyCanvas"></canvas>
    <canvas id="cosmicEffectsCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>
    <canvas id="spiralCanvas"></canvas>
    <canvas id="lightRaysCanvas"></canvas>
    <canvas id="textFlowCanvas"></canvas>

    <div class="container">
        <!-- Central Heart with glow effect -->
        <div class="heart-container">
            <div class="heart-glow"></div>
            <div class="heart-title">
                <p class="subtitle-top">I believed</p>
                <p class="subtitle-bottom">Love Eternal</p>
            </div>
        </div>

        <!-- Spiral Text Below -->
        <div class="spiral-text-container">
            <div class="spiral-text"></div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-group">
                <label>Thay đổi văn bản:</label>
                <input type="text" id="textInput" placeholder="Nhập văn bản..." value="I believed Love Eternal" maxlength="100">
                <button id="updateBtn">Cập nhật</button>
            </div>
            
            <div class="control-group">
                <label>Màu sắc trái tim:</label>
                <input type="color" id="heartColorInput" value="#ff1493">
            </div>
            
            <div class="control-group">
                <label>Tốc độ xoay:</label>
                <input type="range" id="rotationSpeed" min="0.1" max="2" step="0.1" value="0.5">
                <span id="speedValue">0.5x</span>
            </div>
        </div>
    </div>

    <script src="enhanced-galaxy.js"></script>
    <script src="cosmic-effects.js"></script>
    <script src="enhanced-heart.js"></script>
    <script src="light-rays.js"></script>
    <script src="spiral-vortex.js"></script>
    <script src="app.js"></script>
</body>
</html>
