<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cosmic Heart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Giao diện UI Glassmorphism đè lên hiệu ứng 3D */
        .ui-overlay {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 340px;
            pointer-events: auto;
            animation: fadeIn 2s ease-in-out;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.4;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <h1>For You</h1>
        <p>Một vũ trụ nhỏ được tạo ra từ những điểm sáng, luôn xoay quanh tâm trí anh.</p>
    </div>

    <script>
        // Khởi tạo Scene, Camera, Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Công thức toán học tạo hình trái tim 3D (Equation)
        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const color1 = new THREE.Color('#ff0055');
        const color2 = new THREE.Color('#7a00ff');

        for (let i = 0; i < particleCount; i++) {
            // Định dạng phân rã ngẫu nhiên để tạo khối trái tim đầy đặn
            const t = Math.PI * (Math.random() * 2 - 1);
            const p = Math.PI * Math.random();
            
            // Công thức hình học bề mặt trái tim 3D
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = (15 * Math.sin(p)) * (Math.random() - 0.5); // Tạo độ dày 3D

            // Thu nhỏ tỉ lệ
            positions[i * 3] = x * 0.25;
            positions[i * 3 + 1] = y * 0.25;
            positions[i * 3 + 2] = z * 0.15;

            // Đổ màu Gradient cho các hạt từ hồng sang tím
            const mixedColor = color1.clone().lerp(color2, Math.random());
            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Tạo texture hạt tròn sáng mịn
        const canvas = document.createElement('canvas');
        canvas.width = 16;
        canvas.height = 16;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 16, 16);
        const texture = new THREE.CanvasTexture(canvas);

        // Chất liệu hạt
        const material = new THREE.PointsMaterial({
            size: 0.18,
            map: texture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const heartParticles = new THREE.Points(geometry, material);
        scene.add(heartParticles);

        // Hiệu ứng Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            // Xoay trái tim tự động
            heartParticles.rotation.y = time * 0.3;
            heartParticles.rotation.x = 0.2 * Math.sin(time * 0.5);

            // Hiệu ứng đập (Beating) bằng cách co giãn scale dựa trên hàm sin
            const scale = 1 + 0.08 * Math.sin(time * 4);
            heartParticles.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }

        animate();

        // Responsive khi đổi kích thước màn hình điện thoại/máy tính
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
