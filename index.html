<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollywood Cinematic Cosmic Heart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020005; overflow: hidden; font-family: 'Arial', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Giao diện text sang trọng ở tâm trái tim */
        .text-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            color: #ffffff;
            font-family: 'Georgia', serif;
            animation: cinematicPulse 4s ease-in-out infinite;
        }
        .text-overlay h1 {
            font-size: 2rem;
            font-style: italic;
            font-weight: normal;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(255,65,108,0.4);
        }
        .text-overlay h2 {
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #ffe3ec, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        @keyframes cinematicPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="text-overlay">
        <h1>I believed</h1>
        <h2>Love Eternal</h2>
    </div>

    <script>
        // --- 1. SETUP HỆ THỐNG THỜI GIAN VÀ ĐỒ HỌA ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 13); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        // --- 2. TEXTURE HẠT ĐỘC QUYỀN CÓ ĐỘ GLOW ---
        const createGlowTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(255,180,210,0.8)');
            grad.addColorStop(0.5, 'rgba(255,65,108,0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };
        const particleTexture = createGlowTexture();

        // --- 3. PHÔNG NỀN THIÊN HÀ ĐA SẮC ĐỘNG (SỬA LỖI ĐƠN VỊ FLOAT TRÊN GPU) ---
        const bgGeo = new THREE.PlaneGeometry(50, 30);
        const bgMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 } },
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float uTime;
                
                float noise(in vec2 p) {
                    return sin(p.x)*sin(p.y);
                }
                void main() {
                    vec2 uv = vUv - 0.5;
                    float t = uTime * 0.05;
                    
                    float n1 = noise(uv * 3.5 + vec2(t, -t));
                    float n2 = noise(uv * 5.0 - vec2(-t, t * 1.5));
                    
                    vec3 col1 = vec3(0.1, 0.0, 0.15); 
                    vec3 col2 = vec3(0.5, 0.05, 0.3); 
                    vec3 col3 = vec3(0.0, 0.2, 0.4);  
                    
                    vec3 finalCol = mix(col1, col2, n1 + 0.5);
                    finalCol = mix(finalCol, col3, n2 * 0.6);
                    
                    float dist = length(uv);
                    finalCol += vec3(0.3, 0.1, 0.2) * (1.0 - smoothstep(0.0, 0.7, dist));
                    
                    gl_FragColor = vec4(finalCol, 1.0);
                }
            `,
            depthWrite: false
        });
        const bgMesh = new THREE.Mesh(bgGeo, bgMat);
        bgMesh.position.z = -5;
        scene.add(bgMesh);

        // --- 4. SIÊU TRÁI TIM HẠT CO GIÃN ĐẬP ---
        const heartCount = 6000;
        const heartGeo = new THREE.BufferGeometry();
        const heartPos = new Float32Array(heartCount * 3);
        const heartColors = new Float32Array(heartCount * 3);

        const hColor1 = new THREE.Color('#ffe3ec'); 
        const hColor2 = new THREE.Color('#ff0055'); 
        const hColor3 = new THREE.Color('#7a00ff'); 

        for (let i = 0; i < heartCount; i++) {
            const t = Math.PI * (Math.random() * 2 - 1);
            const p = Math.PI * (Math.random() * 2 - 1);
            
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = 5 * Math.sin(p) * Math.sin(t); 

            heartPos[i * 3] = x * 0.3;
            heartPos[i * 3 + 1] = (y * 0.3) + 2.8; 
            heartPos[i * 3 + 2] = z * 0.3;

            // Sửa logic tính toán khoảng cách kiểu JS sang chuẩn số thực
            const distFromCenter = Math.sqrt(x*x + y*y) / 18.0;
            const c = hColor2.clone();
            if(distFromCenter < 0.4) {
                c.lerp(hColor1, 1.0 - (distFromCenter/0.4));
            } else {
                c.lerp(hColor3, Math.min((distFromCenter - 0.4)/0.6, 1.0));
            }

            heartColors[i * 3] = c.r;
            heartColors[i * 3 + 1] = c.g;
            heartColors[i * 3 + 2] = c.b;
        }

        heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPos, 3));
        heartGeo.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));

        const heartMat = new THREE.PointsMaterial({
            size: 0.22,
            map: particleTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });

        const heartPoints = new THREE.Points(heartGeo, heartMat);
        scene.add(heartPoints);

        // --- 5. BỤI THIÊN HÀ RGB XOÁY CUỘN PHÍA DƯỚI ---
        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);

        const galaxyCount = 3500;
        const galaxyGeo = new THREE.BufferGeometry();
        const galaxyPos = new Float32Array(galaxyCount * 3);
        const galaxyColors = new Float32Array(galaxyCount * 3);

        const gColors = [new THREE.Color('#00ffff'), new THREE.Color('#ff00aa'), new THREE.Color('#ffaa00'), new THREE.Color('#00ff66')];

        for(let i=0; i<galaxyCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const distance = 2.5 + Math.pow(Math.random(), 2) * 5.5; 
            const spin = distance * 0.8; 

            const x = Math.cos(angle + spin) * distance;
            const z = Math.sin(angle + spin) * distance;
            const y = (Math.random() - 0.5) * 1.5 * (1.0 - distance/8.0) - 4.0;

            galaxyPos[i * 3] = x;
            galaxyPos[i * 3 + 1] = y;
            galaxyPos[i * 3 + 2] = z;

            const randomColor = gColors[Math.floor(Math.random() * gColors.length)];
            galaxyColors[i * 3] = randomColor.r;
            galaxyColors[i * 3 + 1] = randomColor.g;
            galaxyColors[i * 3 + 2] = randomColor.b;
        }

        galaxyGeo.setAttribute('position', new THREE.BufferAttribute(galaxyPos, 3));
        galaxyGeo.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));

        const galaxyMat = new THREE.PointsMaterial({
            size: 0.16,
            map: particleTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false,
            opacity: 0.85
        });

        const galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
        galaxyGroup.add(galaxyPoints);

        // --- 6. VÒNG CHỮ CHẠY 3D THEO QUỸ ĐẠO THIÊN HÀ ---
        const textWords = ["Luôn hạnh phúc", "Chúc em", "Người anh yêu", "Mãi xinh đẹp", "Luôn vui vẻ", "1/6 này", "May mắn nhất", "Định Mệnh"];
        
        const createTextMesh = (text) => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128; 
            const ctx = canvas.getContext('2d');
            
            ctx.font = 'Bold 42px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff00aa';
            ctx.shadowBlur = 15;
            ctx.fillText(text, 256, 64);

            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
            const geo = new THREE.PlaneGeometry(3.5, 0.88);
            return new THREE.Mesh(geo, mat);
        };

        const rRadius = 4.8;
        textWords.forEach((word, index) => {
            const mesh = createTextMesh(word);
            const angle = (index / textWords.length) * Math.PI * 2;
            
            mesh.position.x = rRadius * Math.cos(angle);
            mesh.position.y = -3.8;
            mesh.position.z = rRadius * Math.sin(angle);
            
            galaxyGroup.add(mesh);
        });

        galaxyGroup.rotation.x = 0.4;
        galaxyGroup.rotation.z = -0.15;

        // --- 7. HIỆU ỨNG SAO BĂNG RƠI ---
        const meteorCount = 20;
        const meteors = [];

        for(let i=0; i<meteorCount; i++) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array([0,0,0,  0.5, 0.5, 0]); 
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.LineBasicMaterial({
                color: new THREE.Color(Math.random() > 0.5 ? '#ffffff' : '#ff00aa'),
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            const line = new THREE.Line(geo, mat);
            line.position.set((Math.random()-0.5)*30, Math.random()*15, (Math.random()-0.5)*20);
            scene.add(line);
            
            meteors.push({
                mesh: line,
                speedX: -0.15 - Math.random()*0.1,
                speedY: -0.15 - Math.random()*0.1,
                reset: function() {
                    this.mesh.position.set(15 + Math.random()*10, 10 + Math.random()*10, (Math.random()-0.5)*20);
                }
            });
        }

        // --- 8. VÒNG LẶP ANIMATION MƯỢT MÀ ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Cập nhật uTime dưới dạng float chuẩn xác
            bgMat.uniforms.uTime.value = elapsedTime;

            // Hiệu ứng nhịp đập tim kép
            const pulse = 1.0 + 0.08 * Math.sin(elapsedTime * 3.0) * Math.cos(elapsedTime * 1.5);
            heartPoints.scale.set(pulse, pulse, pulse);
            heartPoints.rotation.y = elapsedTime * 0.15; 

            // Xoáy bụi vũ trụ và vòng quay chữ
            galaxyPoints.rotation.y = elapsedTime * 0.35; 
            galaxyGroup.rotation.y = -elapsedTime * 0.12; 

            // Hướng mặt chữ về phía camera
            galaxyGroup.children.forEach(child => {
                if(child instanceof THREE.Mesh) {
                    child.lookAt(camera.position);
                }
            });

            // Hiệu ứng chuyển động sao băng
            meteors.forEach(m => {
                m.mesh.position.x += m.speedX;
                m.mesh.position.y += m.speedY;
                if(m.mesh.position.y < -10 || m.mesh.position.x < -20) {
                    m.reset();
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Tối ưu hóa kích thước màn hình
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
