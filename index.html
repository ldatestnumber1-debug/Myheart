<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Heart - Cosmic Web UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas for animations -->
    <canvas id="nebulaCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>
    <canvas id="particlesCanvas"></canvas>

    <div class="container">
        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-group">
                <label>Thay đổi văn bản:</label>
                <input type="text" id="textInput" placeholder="Nhập văn bản..." value="I LOVE YOU" maxlength="50">
                <button id="updateBtn">Cập nhật</button>
            </div>
            
            <div class="control-group">
                <label>Màu sắc trái tim:</label>
                <input type="color" id="heartColorInput" value="#ff1493">
            </div>
            
            <div class="control-group">
                <label>Tốc độ xoay:</label>
                <input type="range" id="rotationSpeed" min="0.1" max="2" step="0.1" value="0.5">
                <span id="speedValue">0.5x</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <h1 class="title">✨ Cosmic Heart ✨</h1>
            <p class="subtitle">Một vũ trụ tình yêu</p>
        </div>
    </div>

    <script src="nebula-background.js"></script>
    <script src="heart-generator.js"></script>
    <script src="particles.js"></script>
    <script src="app.js"></script>
</body>
</html>
